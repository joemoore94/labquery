<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labquery</title>
    <script src="marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1b23;
            border-bottom: 1px solid #2a2b35;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; }

        header .status {
            font-size: 12px;
            color: #71717a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        header .status .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
        }

        header .status .dot.connected { background: #22c55e; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #4338ca;
            color: #fff;
            border-bottom-right-radius: 4px;
            white-space: pre-wrap;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1f2a;
            border: 1px solid #2a2b35;
            border-bottom-left-radius: 4px;
        }

        .message.assistant.streaming { white-space: pre-wrap; }

        /* Markdown content styles */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            color: #c4b5fd;
            margin: 12px 0 6px 0;
            font-size: 15px;
        }

        .message.assistant h1:first-child,
        .message.assistant h2:first-child,
        .message.assistant h3:first-child { margin-top: 0; }

        .message.assistant p { margin: 6px 0; }
        .message.assistant p:first-child { margin-top: 0; }
        .message.assistant p:last-child { margin-bottom: 0; }

        .message.assistant strong { color: #e2e8f0; }

        .message.assistant code {
            background: #2a2b35;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 13px;
            font-family: "SF Mono", Menlo, monospace;
        }

        .message.assistant pre {
            background: #2a2b35;
            padding: 10px 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant pre code {
            background: none;
            padding: 0;
        }

        .message.assistant ul, .message.assistant ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message.assistant li { margin: 3px 0; }

        .message.assistant table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 13px;
        }

        .message.assistant th {
            background: #2a2b35;
            padding: 8px 12px;
            text-align: left;
            border: 1px solid #3f3f46;
            color: #c4b5fd;
            font-weight: 600;
        }

        .message.assistant td {
            padding: 6px 12px;
            border: 1px solid #3f3f46;
        }

        .message.assistant tr:hover td { background: #1a1b23; }

        .message.assistant hr {
            border: none;
            border-top: 1px solid #3f3f46;
            margin: 12px 0;
        }

        .message.tool-indicator {
            align-self: flex-start;
            background: transparent;
            border: 1px dashed #3f3f46;
            color: #a1a1aa;
            font-size: 12px;
            padding: 8px 12px;
            font-family: monospace;
        }

        .message.tool-indicator.done {
            border-color: #22c55e;
            color: #4ade80;
        }

        #input-area {
            background: #1a1b23;
            border-top: 1px solid #2a2b35;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
        }

        #input-area input {
            flex: 1;
            background: #0f1117;
            border: 1px solid #2a2b35;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e4e4e7;
            font-size: 14px;
            outline: none;
        }

        #input-area input:focus { border-color: #4338ca; }
        #input-area input::placeholder { color: #52525b; }

        #input-area button {
            background: #4338ca;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        #input-area button:hover { background: #4f46e5; }
        #input-area button:disabled { background: #27272a; color: #52525b; cursor: default; }

        .welcome {
            text-align: center;
            color: #71717a;
            padding: 40px 20px;
            line-height: 1.8;
        }

        .welcome h2 { color: #a78bfa; font-size: 24px; margin-bottom: 8px; }

        .welcome code {
            background: #1e1f2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <h1>labquery</h1>
        <div class="status">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div id="messages">
        <div class="welcome">
            <h2>labquery</h2>
            <p>Natural language interface for LIMS and liquid handler automation.</p>
            <p style="margin-top: 12px;">
                Try: <code>List some available samples</code><br>
                or: <code>Do we have enough CEL samples for a 96-well plate run?</code>
            </p>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about samples, inventory, or protocols..." autofocus>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        let ws = null;
        let currentBubble = null;
        let currentRawText = '';
        let currentToolIndicator = null;
        let wsUrl = null;

        async function init() {
            try {
                const resp = await fetch('/config.json');
                const config = await resp.json();
                wsUrl = `ws://${location.hostname || '127.0.0.1'}:${config.ws_port}`;
            } catch {
                wsUrl = `ws://${location.hostname || '127.0.0.1'}:8765`;
            }
            connect();
        }

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('status-dot').classList.add('connected');
                document.getElementById('status-text').textContent = 'Connected';
                document.getElementById('send-btn').disabled = false;
            };

            ws.onclose = () => {
                document.getElementById('status-dot').classList.remove('connected');
                document.getElementById('status-text').textContent = 'Disconnected — reconnecting...';
                document.getElementById('send-btn').disabled = true;
                setTimeout(connect, 2000);
            };

            ws.onerror = () => {};

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            };
        }

        function renderMarkdown(text) {
            return marked.parse(text);
        }

        function handleServerMessage(msg) {
            const messages = document.getElementById('messages');

            switch (msg.type) {
                case 'stream_start':
                    currentBubble = document.createElement('div');
                    currentBubble.className = 'message assistant streaming';
                    currentRawText = '';
                    messages.appendChild(currentBubble);
                    break;

                case 'stream_delta':
                    if (currentBubble) {
                        currentRawText += msg.text;
                        currentBubble.textContent = currentRawText;
                        messages.scrollTop = messages.scrollHeight;
                    }
                    break;

                case 'tool_call':
                    currentToolIndicator = document.createElement('div');
                    currentToolIndicator.className = 'message tool-indicator';
                    const toolLabel = msg.tool.replace(/_/g, ' ');
                    const inputSummary = Object.values(msg.input || {}).join(', ');
                    currentToolIndicator.textContent = `[${toolLabel}] ${inputSummary}...`;
                    messages.appendChild(currentToolIndicator);
                    messages.scrollTop = messages.scrollHeight;
                    currentBubble = null;
                    currentRawText = '';
                    break;

                case 'tool_result':
                    if (currentToolIndicator) {
                        currentToolIndicator.classList.add('done');
                        currentToolIndicator.textContent = currentToolIndicator.textContent.replace('...', ' done');
                    }
                    break;

                case 'stream_end':
                    if (currentBubble && currentRawText) {
                        currentBubble.classList.remove('streaming');
                        currentBubble.innerHTML = renderMarkdown(currentRawText);
                    }
                    currentBubble = null;
                    currentRawText = '';
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('user-input').disabled = false;
                    document.getElementById('user-input').focus();
                    break;

                case 'error':
                    const errBubble = document.createElement('div');
                    errBubble.className = 'message assistant';
                    errBubble.style.borderColor = '#ef4444';
                    errBubble.textContent = `Error: ${msg.message}`;
                    messages.appendChild(errBubble);
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('user-input').disabled = false;
                    break;
            }

            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            const messages = document.getElementById('messages');
            const bubble = document.createElement('div');
            bubble.className = 'message user';
            bubble.textContent = text;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;

            ws.send(JSON.stringify({ type: 'message', text: text }));

            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        init();
    </script>
</body>
</html>
